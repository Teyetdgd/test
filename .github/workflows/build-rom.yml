name: Ultra-Minimal Android ROM Build

on:
  workflow_dispatch: # Manuel başlatmak için

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Disk Alanı Aç (Kritik Adım)
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Bağımlılıkları Kur
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libc6-dev-i386 \
            lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev \
            libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig python3

      - name: Repo Aracını Kur
        run: |
          mkdir ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          export PATH=$PATH:~/bin

      - name: AOSP Kaynak Kodunu Çek (Minimal)
        run: |
          PATH=$PATH:~/bin
          mkdir android && cd android
          repo init -u https://android.googlesource.com/platform/manifest -b android-14.0.0_r1 --depth=1
          # Sadece framework ve gerekli kütüphaneleri çekiyoruz (Zaman kazandırır)
          repo sync -c -j$(nproc --all) --no-clone-bundle --no-tags

      - name: ROM Derleme (Lunch & Make)
        run: |
          cd android
          source build/envsetup.sh
          # x86_64 PC'ler için en hafif profil
          lunch aosp_x86_64-eng 
          # Sadece sistem imajını yapıyoruz, tüm her şeyi değil!
          make systemimage -j$(nproc --all)

      - name: Artifact Olarak Yükle
        uses: actions/upload-artifact@v4
        with:
          name: Minimal-Android-ROM
          path: android/out/target/product/generic_x86_64/system.img
