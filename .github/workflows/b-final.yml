name: FATIH-PIE-SUCCESS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Nükleer Disk Temizliği
        # GitHub'ın önceden kurduğu ne varsa (Dotnet, Android SDK, vs.) siliyoruz
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /opt/az
          sudo rm -rf /usr/share/swift /usr/local/share/powershell /usr/local/bin/aliyun /usr/local/bin/azcopy
          docker rmi $(docker images -q) || true
          df -h

      - name: Bağımlılıkları Kur
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libc6-dev-i386 \
            libncurses5-dev lib32z1-dev \
            libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig \
            python3 python-is-python3 libssl-dev x11proto-core-dev libx11-dev \
            bison gperf

      - name: Repo Aracını Kur
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: AOSP 9.0 Çek
        run: |
          mkdir android && cd android
          repo init -u https://android.googlesource.com/platform/manifest -b android-9.0.0_r46 --depth=1
          repo sync -c -j$(nproc --all) --no-clone-bundle --no-tags

      - name: Derleme Öncesi Alan Boşalt
        # Kodlar indi, .repo klasörünü (yaklaşık 30GB) SİLİYORUZ. 
        # Dikkat: Bu işlemden sonra build hata verirse baştan başlaman gerekir ama yer açmak için şart.
        run: |
          cd android
          rm -rf .repo
          df -h

      - name: ROM Derleme
        run: |
          cd android
          source build/envsetup.sh
          lunch aosp_x86_64-eng 
          # Sadece sistemi derliyoruz ki yer kazanalım
          make systemimage -j$(nproc --all)

      - name: Artifact Olarak Yükle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Minimal-Android-9-Image
          path: android/out/target/product/generic_x86_64/system.img
