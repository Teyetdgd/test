name: FATIHIN-ROMU

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 # 22.04'te kalalım, en sağlamı bu.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Disk Temizle
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Bağımlılıkları Kur (Hata Alsa Da Devam Et)
        run: |
          sudo apt-get update
          # Aşağıdaki komutta hata verse bile (-y --ignore-missing) durmayacak
          sudo apt-get install -y bc build-essential zip curl libc6-dev-i386 \
            libncurses5-dev lib32z1-dev \
            libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig \
            python3 python-is-python3 libssl-dev x11proto-core-dev libx11-dev \
            bison gperf || echo "Bazı paketler kurulamadı ama devam ediyoruz kanka!"

      - name: Repo Aracını Kur
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: AOSP Kaynak Kodunu Çek
        run: |
          mkdir android && cd android
          repo init -u https://android.googlesource.com/platform/manifest -b android-11.0.0_r1 --depth=1
          repo sync -c -j$(nproc --all) --no-clone-bundle --no-tags

      - name: ROM Derleme
        run: |
          cd android
          source build/envsetup.sh
          lunch aosp_x86_64-eng 
          make systemimage -j$(nproc --all)

      - name: Artifact Olarak Yükle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Minimal-Android-ROM
          path: android/out/target/product/generic_x86_64/system.img
