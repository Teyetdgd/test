name: FATIH-V3-FINISH-HIM

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Alan Temizliği
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Bağımlılıkları Kur (Libncurses Fix Dahil)
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libc6-dev-i386 \
            libncurses5 libncurses5-dev lib32z1-dev \
            libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig \
            python3 python-is-python3 libssl-dev x11proto-core-dev libx11-dev \
            bison gperf
          
          # SENİN İSTEDİĞİN O KRİTİK LİNKLEME KOMUTLARI:
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libncurses.so.6 /usr/lib/x86_64-linux-gnu/libncurses.so.5
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libtinfo.so.6 /usr/lib/x86_64-linux-gnu/libtinfo.so.5

      - name: Repo Aracını Kur
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: AOSP Kaynak Kodunu Çek
        run: |
          mkdir android && cd android
          repo init -u https://android.googlesource.com/platform/manifest -b android-11.0.0_r1 --depth=1
          repo sync -c -j$(nproc --all) --no-clone-bundle --no-tags

      - name: ROM Derleme (System Image Only)
        run: |
          cd android
          # Disk alanı dolmasın diye .repo klasörünü siliyoruz (Kodlar indi artık lazım değil)
          rm -rf .repo
          source build/envsetup.sh
          lunch aosp_x86_64-eng 
          make systemimage -j$(nproc --all)

      - name: Artifact Olarak Yükle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Minimal-Android-ROM-Image
          path: android/out/target/product/generic_x86_64/system.img
